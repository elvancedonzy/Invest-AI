apiVersion: batch/v1
kind: CronJob
metadata:
  name: earnings-watch
  namespace: invest-ai
spec:
  # Twice on weekdays: 12:30 UTC (~7:30am EST / 8:30am EDT, pre-open) and
  # 18:30 UTC (~1:30pm EST / 2:30pm EDT, mid-day) — second push catches
  # anyone who missed the morning notification.
  schedule: "30 12,18 * * 1-5"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: earnings-watch
            image: python:3.11-slim
            command: ["/bin/sh", "-c"]
            args:
            - "pip install requests -q && python /scripts/earnings_watch.py"
            env:
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: POLYGON_API_KEY
            - name: FINNHUB_KEY
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: FINNHUB_KEY
            - name: HA_URL
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: HA_URL
                  optional: true
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: HA_TOKEN
                  optional: true
            - name: HA_NOTIFY_SERVICE
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: HA_NOTIFY_SERVICE
                  optional: true
            volumeMounts:
            - name: reports
              mountPath: /reports
            - name: scripts
              mountPath: /scripts
          volumes:
          - name: reports
            hostPath:
              path: /mnt/alpha-reports
              type: Directory
          - name: scripts
            configMap:
              name: earnings-watch-script
          restartPolicy: OnFailure
