# Home Assistant Lovelace Dashboard Card for Invest AI
# Add this to your HA dashboard via: Settings → Dashboards → Edit → Add Card → Manual
#
# Requirements:
#   - Your phone must be on the same WiFi as the NAS (192.168.1.x)
#   - OR set up a VPN/tunnel for external access
#
# Option 1: Iframe Card (simplest — shows full dashboard)
# ─────────────────────────────────────────────────────────
type: iframe
url: http://192.168.1.201:30080
aspect_ratio: "16:9"
title: Invest AI Dashboard

---

