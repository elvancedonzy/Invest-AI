apiVersion: batch/v1
kind: CronJob
metadata:
  name: discord-fetcher
  namespace: invest-ai
spec:
  schedule: "30 9 * * 1-5"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: fetcher
            image: python:3.11-slim
            command: ["/bin/sh", "-c"]
            args:
            - "pip install discord.py -q && pip install aiohttp -q && python /scripts/fetcher.py"
            env:
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: DISCORD_TOKEN
            - name: DISCORD_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: DISCORD_CHANNEL_ID
            volumeMounts:
            - name: reports
              mountPath: /reports
            - name: scripts
              mountPath: /scripts
          volumes:
          - name: reports
            persistentVolumeClaim:
              claimName: reports-pvc
          - name: scripts
            configMap:
              name: fetcher-script
          restartPolicy: OnFailure
