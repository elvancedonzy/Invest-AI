# CI/CD: Auto-deploy on git push
# Polls GitHub every 5 minutes. When a new commit is detected on main,
# downloads main.py / analyzer.py / backfill.py, updates ConfigMaps,
# and restarts the API deployment automatically.
#
# Apply once:
#   kubectl apply -f autodeploy.yaml
#
# Check logs:
#   kubectl logs -l app=autodeploy -n invest-ai --tail=30
#
# Force immediate run:
#   kubectl create job autodeploy-now --from=cronjob/autodeploy -n invest-ai

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: autodeploy
  namespace: invest-ai

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autodeploy
  namespace: invest-ai
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["apps"]
  resources: ["deployments/status"]
  verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autodeploy
  namespace: invest-ai
subjects:
- kind: ServiceAccount
  name: autodeploy
  namespace: invest-ai
roleRef:
  kind: Role
  name: autodeploy
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autodeploy-script
  namespace: invest-ai
data:
  deploy.sh: |
    #!/bin/sh
    set -e

    REPO="elvancedonzy/Invest-AI"
    NS="invest-ai"
    STATE_CM="autodeploy-state"
    KUBECTL_CACHE="/reports/.bin/kubectl"

    echo "[autodeploy] $(date '+%Y-%m-%d %H:%M:%S') checking for updates..."

    # ── Ensure curl is available ──────────────────────────────────────────
    if ! which curl > /dev/null 2>&1; then
      echo "[autodeploy] Installing curl..."
      apt-get update -qq && apt-get install -y -q curl
    fi

    # ── Ensure kubectl is available (cached on NFS after first download) ──
    if [ ! -f "$KUBECTL_CACHE" ]; then
      echo "[autodeploy] Downloading kubectl (one-time, cached to NFS)..."
      mkdir -p /reports/.bin
      curl -sLo "$KUBECTL_CACHE" \
        "https://dl.k8s.io/release/v1.28.3/bin/linux/amd64/kubectl"
      chmod +x "$KUBECTL_CACHE"
      echo "[autodeploy] kubectl ready"
    fi
    export PATH="/reports/.bin:$PATH"

    # ── Check latest GitHub commit (uses token for private repo) ────────
    if [ -n "$GITHUB_TOKEN" ]; then
      GH_RESPONSE=$(curl -s --connect-timeout 15 --max-time 30 \
        -H "Accept: application/vnd.github.v3+json" \
        -H "Authorization: token $GITHUB_TOKEN" \
        "https://api.github.com/repos/$REPO/commits/main")
    else
      GH_RESPONSE=$(curl -s --connect-timeout 15 --max-time 30 \
        -H "Accept: application/vnd.github.v3+json" \
        "https://api.github.com/repos/$REPO/commits/main")
    fi

    LATEST=$(echo "$GH_RESPONSE" | \
      python3 -c "import json,sys; d=json.load(sys.stdin); print(d['sha'])" 2>/dev/null || echo "")

    if [ -z "$LATEST" ]; then
      echo "[autodeploy] WARNING: Could not parse SHA. API response: $(echo "$GH_RESPONSE" | cut -c1-300)"
      exit 0
    fi

    echo "[autodeploy] Latest commit : $LATEST"

    # ── Compare with last deployed commit ────────────────────────────────
    DEPLOYED=$(kubectl get configmap $STATE_CM -n $NS \
      -o jsonpath='{.data.last_commit}' 2>/dev/null || echo "")

    echo "[autodeploy] Last deployed : ${DEPLOYED:-none}"

    if [ "$LATEST" = "$DEPLOYED" ]; then
      echo "[autodeploy] Already up to date — nothing to do"
      exit 0
    fi

    echo "[autodeploy] New commit detected! Deploying..."

    # ── Download updated files ────────────────────────────────────────────
    BASE="https://raw.githubusercontent.com/$REPO/$LATEST"
    TMP=$(mktemp -d)

    dl() {{
      if [ -n "$GITHUB_TOKEN" ]; then
        curl -sf -H "Authorization: token $GITHUB_TOKEN" "$1" -o "$2"
      else
        curl -sf "$1" -o "$2"
      fi
    }}

    dl "$BASE/main.py"     "$TMP/main.py"     && echo "[autodeploy]   Got main.py"
    dl "$BASE/analyzer.py" "$TMP/analyzer.py" && echo "[autodeploy]   Got analyzer.py"
    dl "$BASE/backfill.py" "$TMP/backfill.py" 2>/dev/null && echo "[autodeploy]   Got backfill.py" || true

    # ── Update ConfigMaps ─────────────────────────────────────────────────
    kubectl create configmap api-script \
      --from-file=main.py="$TMP/main.py" -n $NS \
      --dry-run=client -o yaml | kubectl apply -f -

    kubectl create configmap analyzer-script \
      --from-file=analyzer.py="$TMP/analyzer.py" -n $NS \
      --dry-run=client -o yaml | kubectl apply -f -

    [ -f "$TMP/backfill.py" ] && \
      kubectl create configmap backfill-script \
        --from-file=backfill.py="$TMP/backfill.py" -n $NS \
        --dry-run=client -o yaml | kubectl apply -f -

    # ── Restart API deployment ────────────────────────────────────────────
    echo "[autodeploy] Restarting invest-ai-api..."
    kubectl rollout restart deployment/invest-ai-api -n $NS
    kubectl rollout status  deployment/invest-ai-api -n $NS --timeout=120s

    # ── Save deployed commit to ConfigMap ─────────────────────────────────
    kubectl create configmap $STATE_CM \
      --from-literal=last_commit="$LATEST" \
      --from-literal=deployed_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
      -n $NS --dry-run=client -o yaml | kubectl apply -f -

    rm -rf "$TMP"
    echo "[autodeploy] Done! Running commit: $LATEST"

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: autodeploy
  namespace: invest-ai
  labels:
    app: autodeploy
spec:
  schedule: "*/5 * * * *"       # every 5 minutes
  concurrencyPolicy: Forbid      # never run two at once
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: autodeploy
        spec:
          serviceAccountName: autodeploy
          containers:
          - name: deployer
            image: python:3.11-slim
            command: ["/bin/sh", "/scripts/deploy.sh"]
            env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: GITHUB_TOKEN
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: reports
              mountPath: /reports
          volumes:
          - name: scripts
            configMap:
              name: autodeploy-script
              defaultMode: 0755
          - name: reports
            hostPath:
              path: /mnt/alpha-reports
              type: Directory
          restartPolicy: OnFailure
