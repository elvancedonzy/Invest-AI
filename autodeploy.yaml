# CI/CD: Auto-deploy on git push
# Polls GitHub every 5 minutes. When a new commit is detected on main,
# downloads main.py / analyzer.py / backfill.py, updates ConfigMaps,
# and restarts the API deployment automatically.
#
# Apply once:
#   kubectl apply -f autodeploy.yaml
#
# Check logs:
#   kubectl logs -l app=autodeploy -n invest-ai --tail=30
#
# Force immediate run:
#   kubectl create job autodeploy-now --from=cronjob/autodeploy -n invest-ai

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: autodeploy
  namespace: invest-ai

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autodeploy
  namespace: invest-ai
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["apps"]
  resources: ["deployments/status"]
  verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autodeploy
  namespace: invest-ai
subjects:
- kind: ServiceAccount
  name: autodeploy
  namespace: invest-ai
roleRef:
  kind: Role
  name: autodeploy
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autodeploy-script
  namespace: invest-ai
data:
  deploy.py: |
    #!/usr/bin/env python3
    """
    Invest AI CI/CD — polls GitHub every 5 min, deploys on new commits.
    Pure Python: no curl pipe issues, no heredoc YAML problems.
    """
    import os, sys, json, subprocess, urllib.request, tempfile, shutil
    from datetime import datetime, timezone

    REPO      = "elvancedonzy/Invest-AI"
    BRANCH    = "main"
    NS        = "invest-ai"
    STATE_CM  = "autodeploy-state"
    KUBECTL   = "/reports/.bin/kubectl"

    def log(msg):
        ts = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S")
        print(f"[autodeploy] {ts} {msg}", flush=True)

    def _fetch(url, extra_hdrs=None):
        """Fetch URL — tries without auth first (public repo), falls back to token."""
        hdrs = {"User-Agent": "invest-ai-autodeploy"}
        if extra_hdrs:
            hdrs.update(extra_hdrs)
        try:
            req = urllib.request.Request(url, headers=hdrs)
            with urllib.request.urlopen(req, timeout=20) as r:
                return r.read()
        except urllib.error.HTTPError as e:
            if e.code in (401, 403):
                token = os.environ.get("GITHUB_TOKEN", "")
                if token:
                    hdrs["Authorization"] = "token " + token
                    req = urllib.request.Request(url, headers=hdrs)
                    with urllib.request.urlopen(req, timeout=20) as r:
                        return r.read()
            raise

    def gh_get(path):
        hdrs = {"Accept": "application/vnd.github.v3+json"}
        return json.loads(_fetch("https://api.github.com" + path, hdrs))

    def download(url, dest):
        data = _fetch(url)
        with open(dest, "wb") as f:
            f.write(data)

    def kube(*args, stdin=None):
        return subprocess.run(
            [KUBECTL] + list(args),
            capture_output=True, text=True, input=stdin)

    def ensure_kubectl():
        if not os.path.exists(KUBECTL):
            log("Downloading kubectl (one-time, cached to NFS)...")
            os.makedirs(os.path.dirname(KUBECTL), exist_ok=True)
            download(
                "https://dl.k8s.io/release/v1.28.3/bin/linux/amd64/kubectl",
                KUBECTL)
            os.chmod(KUBECTL, 0o755)
            log("kubectl cached to NFS")

    def apply_configmap(cm_name, file_key, file_path):
        dry = kube("create", "configmap", cm_name,
                   f"--from-file={file_key}={file_path}",
                   "-n", NS, "--dry-run=client", "-o", "yaml")
        result = kube("apply", "-f", "-", stdin=dry.stdout)
        status = result.stdout.strip() or result.stderr.strip()
        log(f"  {cm_name}: {status[:80]}")

    def main():
        log("Checking for updates...")
        ensure_kubectl()

        # ── Get latest commit SHA from GitHub ──────────────────────────────
        try:
            data   = gh_get(f"/repos/{REPO}/commits/{BRANCH}")
            latest = data["sha"]
        except Exception as e:
            log(f"WARNING: GitHub API error — {e}")
            sys.exit(0)

        log(f"Latest commit:  {latest[:12]}")

        # ── Get last deployed commit from ConfigMap ────────────────────────
        res      = kube("get", "configmap", STATE_CM,
                        "-n", NS, "-o", "jsonpath={.data.last_commit}")
        deployed = res.stdout.strip() if res.returncode == 0 else ""
        log(f"Last deployed:  {deployed[:12] if deployed else 'none'}")

        if latest == deployed:
            log("Already up to date — nothing to do")
            return

        log(f"New commit detected! Deploying {latest[:12]}...")

        # ── Download updated files ─────────────────────────────────────────
        base = f"https://raw.githubusercontent.com/{REPO}/{latest}"
        tmp  = tempfile.mkdtemp()

        try:
            for fname, cm_name in [
                ("main.py",     "api-script"),
                ("analyzer.py", "analyzer-script"),
            ]:
                dest = os.path.join(tmp, fname)
                try:
                    download(f"{base}/{fname}", dest)
                    log(f"  Downloaded {fname}")
                    apply_configmap(cm_name, fname, dest)
                except Exception as e:
                    log(f"  ERROR on {fname}: {e}")
                    return

            # backfill.py is optional
            try:
                dest = os.path.join(tmp, "backfill.py")
                download(f"{base}/backfill.py", dest)
                log("  Downloaded backfill.py")
                apply_configmap("backfill-script", "backfill.py", dest)
            except Exception:
                pass

            # ── Restart API deployment ─────────────────────────────────────
            log("Restarting invest-ai-api...")
            kube("rollout", "restart", "deployment/invest-ai-api", "-n", NS)
            status = kube("rollout", "status", "deployment/invest-ai-api",
                          "-n", NS, "--timeout=120s")
            log(status.stdout.strip() or status.stderr.strip()[:80])

            # ── Save deployed commit ───────────────────────────────────────
            now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
            dry = kube("create", "configmap", STATE_CM,
                       f"--from-literal=last_commit={latest}",
                       f"--from-literal=deployed_at={now}",
                       "-n", NS, "--dry-run=client", "-o", "yaml")
            kube("apply", "-f", "-", stdin=dry.stdout)
            log(f"Done! Running commit: {latest[:12]}")

        finally:
            shutil.rmtree(tmp, ignore_errors=True)

    main()

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: autodeploy
  namespace: invest-ai
  labels:
    app: autodeploy
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: autodeploy
        spec:
          serviceAccountName: autodeploy
          containers:
          - name: deployer
            image: python:3.11-slim
            command: ["python3", "/scripts/deploy.py"]
            env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: invest-ai-secrets
                  key: GITHUB_TOKEN
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: reports
              mountPath: /reports
          volumes:
          - name: scripts
            configMap:
              name: autodeploy-script
              defaultMode: 0755
          - name: reports
            hostPath:
              path: /mnt/alpha-reports
              type: Directory
          restartPolicy: OnFailure
